# Elastic Stack for elastic-llm-benchmarker local development
# Usage: docker compose --env-file .env.docker up -d elasticsearch kibana

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-8.17.0}
    container_name: benchmarker-elasticsearch
    environment:
      - node.name=es01
      - cluster.name=${CLUSTER_NAME:-benchmarker-local}
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.license.self_generated.type=${LICENSE:-basic}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT:-9200}:9200"
      - "9343:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    mem_limit: ${ES_MEM_LIMIT:-2147483648}

  init-elasticsearch:
    image: curlimages/curl:latest
    container_name: benchmarker-init-es
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_SYSTEM_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Setting kibana_system password..."
        curl -s -X POST "http://elasticsearch:9200/_security/user/kibana_system/_password" \
          -u "elastic:$${ELASTIC_PASSWORD}" \
          -H "Content-Type: application/json" \
          -d "{\"password\":\"$${KIBANA_SYSTEM_PASSWORD}\"}" \
          || true
        echo "Done."

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION:-8.17.0}
    container_name: benchmarker-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - xpack.security.enabled=true
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
      init-elasticsearch:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:5601/api/status | grep -q 200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    mem_limit: ${KB_MEM_LIMIT:-1073741824}
    volumes:
      - kibana-data:/usr/share/kibana/data
      - ./config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro

  init-kibana:
    image: curlimages/curl:latest
    container_name: benchmarker-init-kibana
    depends_on:
      kibana:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./kibana:/kibana:ro
      - init-kibana-flag:/tmp
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -f /tmp/init-done ]; then
          echo "Kibana init already done, skipping."
          exit 0
        fi
        echo "Waiting for Kibana readiness..."
        for i in $(seq 1 60); do
          if curl -s -o /dev/null -w '%{http_code}' -u "elastic:$${ELASTIC_PASSWORD}" "http://kibana:5601/api/status" | grep -q 200; then
            echo "Kibana is ready."
            break
          fi
          if [ $$i -eq 60 ]; then echo "Kibana not ready after 60 attempts."; exit 1; fi
          sleep 2
        done
        if [ -f /kibana/saved-objects.ndjson ]; then
          echo "Importing saved objects..."
          curl -s -X POST "http://kibana:5601/api/saved_objects/_import" \
            -u "elastic:$${ELASTIC_PASSWORD}" \
            -H "kbn-xsrf: true" \
            -H "Content-Type: multipart/form-data" \
            --form "file=@/kibana/saved-objects.ndjson" || true
          echo "Import complete."
        else
          echo "No /kibana/saved-objects.ndjson found, skipping import."
        fi
        touch /tmp/init-done
        echo "Init done."

  fleet-server:
    image: docker.elastic.co/elastic-agent/elastic-agent:${STACK_VERSION:-8.17.0}
    container_name: benchmarker-fleet-server
    profiles:
      - fleet
    environment:
      - FLEET_SERVER_ENABLE=true
      - FLEET_SERVER_POLICY_ID=fleet-server-policy
      - FLEET_SERVER_ELASTICSEARCH_HOST=http://elasticsearch:9200
      - FLEET_SERVER_SERVICE_TOKEN=${FLEET_SERVICE_TOKEN}
      - FLEET_SERVER_INSECURE_HTTP=true
      - FLEET_SERVER_HOST=0.0.0.0
      - FLEET_SERVER_PORT=8220
      - FLEET_URL=http://fleet-server:8220
      - KIBANA_HOST=http://kibana:5601
    ports:
      - "${FLEET_PORT:-8243}:8220"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    volumes:
      - fleet-data:/usr/share/elastic-agent/state
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8220/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 120s

  # EDOT Collector — scrapes vLLM Prometheus metrics and accepts OTLP traces,
  # then exports directly to Elasticsearch (no APM Server needed).
  edot-collector:
    image: docker.elastic.co/elastic-agent/elastic-agent:${STACK_VERSION:-8.17.0}
    container_name: benchmarker-edot-collector
    profiles:
      - vllm
    command: ["otel", "--config", "/etc/otel/config.yml"]
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - VLLM_METRICS_TARGET=${VLLM_METRICS_TARGET:-host.docker.internal:8000}
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./config/otel-collector.yml:/etc/otel/config.yml:ro
    healthcheck:
      test: ["CMD", "elastic-agent", "status"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    mem_limit: 536870912

volumes:
  es-data:
  kibana-data:
  fleet-data:
  init-kibana-flag:
