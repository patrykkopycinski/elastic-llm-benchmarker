name: CI

on:
  push:
    branches: [main, 'ao/**']
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run

      - name: Audit
        # Audit runtime (production) dependencies only. The daemon ships prod deps;
        # dev-only test tooling (vitest/vite/esbuild dev-server advisories) is never in
        # the deployed artifact and shouldn't gate merges on upstream test-framework churn.
        run: npm audit --omit=dev --audit-level high

      - name: Build
        run: npm run build
